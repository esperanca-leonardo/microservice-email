version: '3.8'

networks:
  microservice-email-network:
    driver: bridge

services:
  mysql:
    image: mysql:8.3.0
    networks:
      - microservice-email-network
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: microservice_email
      MYSQL_USER: user
      MYSQL_PASSWORD: 123
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5.2.1-apache
    networks:
      - microservice-email-network
    ports:
      - "8082:80"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: user
      PMA_PASSWORD: 123

  microservice-email:
    image: esperanca98/microservice-email:latest
    networks:
      - microservice-email-network
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: dev.esperanca.leonardo@gmail.com
      MAIL_PASSWORD: "axqo foca odvj ujaw"
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: microservice_email
      DATABASE_USERNAME: user
      DATABASE_PASSWORD: 123
