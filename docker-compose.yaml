version: '3.8'

networks:
  microservice-email-network:
    driver: bridge

services:
  mysql:
    image: mysql:8.3.0
    networks:
      - microservice-email-network
    ports:
      - "${DATABASE_HOST_PORT:-3306}:${DATABASE_DOCKER_PORT:-3306}"
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD:-123}
      MYSQL_DATABASE: ${DATABASE_NAME:-microservice_email}
      MYSQL_USER: ${DATABASE_USER:-user}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-123}
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5.2.1-apache
    networks:
      - microservice-email-network
    ports:
      - "${PHPMYADMIN_HOST_PORT:-8081}:${PHPMYADMIN_DOCKER_PORT:-80}"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: ${DATABASE_HOST:-mysql}
      PMA_PORT: ${DATABASE_HOST_PORT:-3306}
      PMA_USER: ${DATABASE_USER:-user}
      PMA_PASSWORD: ${DATABASE_PASSWORD:-123}

  microservice-email:
    image: esperanca98/microservice-email:latest
    networks:
      - microservice-email-network
    ports:
      - "${SERVER_HOST_PORT:-8080}:${SERVER_DOCKER_PORT:-8080}"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_HOST_PORT: ${SERVER_HOST_PORT:-8080}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      DATABASE_HOST: ${DATABASE_HOST:-mysql}
      DATABASE_PORT: ${DATABASE_HOST_PORT:-3306}
      DATABASE_NAME: ${DATABASE_NAME:-microservice_email}
      DATABASE_USERNAME: ${DATABASE_USER:-user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-123}
